<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel de programación · Shopify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0D12;
    --panel: #12161F;
    --panel-raised: #161B25;
    --border: #232838;
    --hairline: #1C212E;
    --text: #E8EAEF;
    --muted: #7A8194;
    --muted-dim: #4D5266;
    --amber: #FFB627;
    --amber-dim: #4A3C1A;
    --teal: #4FD8C2;
    --teal-dim: #1A3A35;
    --red: #FB7185;
    --red-dim: #3A1E24;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  a { color: var(--amber); }

  .wrap {
    max-width: 1240px;
    margin: 0 auto;
    padding: 28px 24px 80px;
  }

  header.top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--hairline);
    margin-bottom: 24px;
  }

  header.top .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  header.top .brand .flag {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--amber);
    border: 1px solid var(--amber-dim);
    background: rgba(255, 182, 39, 0.06);
    padding: 3px 7px;
    border-radius: 3px;
  }

  header.top h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .config {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .config input {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 10px;
    border-radius: 4px;
    width: 300px;
  }

  .config input:focus { outline: 1px solid var(--amber); color: var(--text); }

  .config button {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 12px;
    border-radius: 4px;
    cursor: pointer;
  }
  .config button:hover { border-color: var(--muted); color: var(--text); }

  .grid {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 20px;
    align-items: start;
  }

  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  .panel h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 16px;
    font-weight: 600;
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 16px;
  }
  label:first-of-type { margin-top: 0; }

  input, select {
    width: 100%;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 9px 10px;
    border-radius: 5px;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--amber);
  }

  .field-row { display: flex; gap: 10px; }
  .field-row > div { flex: 1; }

  .product-results {
    margin-top: 8px;
    max-height: 220px;
    overflow-y: auto;
    border: 1px solid var(--hairline);
    border-radius: 5px;
  }

  .product-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    cursor: pointer;
    border-bottom: 1px solid var(--hairline);
    font-size: 13px;
  }
  .product-item:last-child { border-bottom: none; }
  .product-item:hover { background: var(--panel-raised); }
  .product-item img {
    width: 28px; height: 28px; object-fit: cover; border-radius: 3px;
    background: var(--panel-raised);
  }
  .product-item .ph { width: 28px; height: 28px; border-radius: 3px; background: var(--panel-raised); flex-shrink: 0; }

  .selected-product {
    margin-top: 10px;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px;
    font-size: 13px;
    display: none;
  }
  .selected-product.visible { display: block; }
  .selected-product .name { font-weight: 600; margin-bottom: 6px; }
  .selected-product .clear {
    float: right;
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
  }
  .selected-product .sub-note { color: var(--muted-dim); font-size: 11px; margin-top: 8px; clear: both; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 11.5px;
    padding: 4px 8px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .chip button {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 12px; padding: 0; line-height: 1;
  }
  .chip button:hover { color: var(--red); }

  .product-item input[type="checkbox"] {
    width: auto;
    accent-color: var(--amber);
  }

  .type-toggle {
    display: flex;
    gap: 6px;
    margin-top: 16px;
  }
  .type-toggle button {
    flex: 1;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    font-family: var(--sans);
    font-weight: 500;
    padding: 9px 4px;
    border-radius: 5px;
    cursor: pointer;
    text-align: center;
  }
  .type-toggle button.active {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(255, 182, 39, 0.06);
  }

  .rule-fields { display: none; }
  .rule-fields.active { display: block; }

  .submit-btn {
    width: 100%;
    margin-top: 20px;
    background: var(--amber);
    color: #17130A;
    border: none;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    padding: 11px;
    border-radius: 5px;
    cursor: pointer;
  }
  .submit-btn:hover { background: #ffc456; }
  .submit-btn:disabled { background: var(--muted-dim); color: var(--muted); cursor: not-allowed; }

  .form-msg {
    margin-top: 10px;
    font-size: 12px;
    font-family: var(--mono);
    display: none;
  }
  .form-msg.ok { color: var(--teal); display: block; }
  .form-msg.err { color: var(--red); display: block; }

  /* --- Board --- */

  .board-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }

  .board-header h2 { margin: 0; }

  .board-counts {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 14px;
  }
  .board-counts span.amber { color: var(--amber); }
  .board-counts span.teal { color: var(--teal); }
  .board-counts span.red { color: var(--red); }

  .board-group { margin-bottom: 22px; }

  .board-group-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted-dim);
    margin-bottom: 8px;
    padding-left: 2px;
  }

  .board-row {
    display: grid;
    grid-template-columns: 150px 1fr 160px 90px 28px;
    align-items: center;
    gap: 12px;
    padding: 11px 12px;
    background: var(--panel-raised);
    border: 1px solid var(--hairline);
    border-radius: 6px;
    margin-bottom: 6px;
    animation: flicker-in 0.25s ease-out;
  }

  @media (max-width: 700px) {
    .board-row { grid-template-columns: 1fr; gap: 4px; }
  }

  @keyframes flicker-in {
    0% { opacity: 0; transform: translateY(-2px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .board-row { animation: none; }
  }

  .board-row .time {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--amber);
    letter-spacing: 0.02em;
  }
  .board-row.done .time { color: var(--teal); }
  .board-row.failed .time { color: var(--red); }

  .board-row .desc { font-size: 13px; }
  .board-row .desc .sub { color: var(--muted); font-size: 11.5px; margin-top: 2px; }

  .board-row .action-type {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .status-pill {
    font-family: var(--mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 3px;
    text-align: center;
    justify-self: start;
  }
  .status-pill.pending { color: var(--amber); background: var(--amber-dim); }
  .status-pill.done { color: var(--teal); background: var(--teal-dim); }
  .status-pill.failed { color: var(--red); background: var(--red-dim); }

  .row-delete {
    background: none;
    border: none;
    color: var(--muted-dim);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    justify-self: end;
  }
  .row-delete:hover { color: var(--red); }

  .empty-state {
    padding: 30px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    border: 1px dashed var(--border);
    border-radius: 6px;
  }

  .error-banner {
    background: var(--red-dim);
    border: 1px solid #5A2530;
    color: #FFC2CB;
    font-size: 12.5px;
    padding: 9px 12px;
    border-radius: 5px;
    margin-bottom: 16px;
    font-family: var(--mono);
    display: none;
  }
  .error-banner.visible { display: block; }
</style>
</head>
<body>

<div class="wrap">
  <header class="top">
    <div class="brand">
      <span class="flag">SCHED</span>
      <h1>Panel de programación</h1>
    </div>
    <div class="config">
      <input id="apiBaseInput" type="text" placeholder="https://tu-worker.workers.dev" />
      <button id="saveApiBase">Conectar</button>
    </div>
  </header>

  <div id="errorBanner" class="error-banner"></div>

  <div class="grid">

    <!-- Formulario para crear reglas -->
    <div class="panel">
      <h2>Nueva regla</h2>

      <label for="productSearch">Productos</label>
      <input id="productSearch" type="text" placeholder="Escribe para filtrar (o deja vacío para ver los últimos)" autocomplete="off" />
      <div id="productResults" class="product-results" style="display:none;"></div>

      <div id="selectedProduct" class="selected-product">
        <span class="clear" id="clearProduct">quitar todos</span>
        <div class="name"><span id="selectedCount">0</span> producto(s) seleccionado(s)</div>
        <div id="selectedChips" class="chips"></div>
        <div class="sub-note">Para inventario y precio se usa la primera variante de cada producto.</div>
      </div>

      <label>Tipo de regla</label>
      <div class="type-toggle">
        <button type="button" class="type-btn active" data-type="publish">Publicar</button>
        <button type="button" class="type-btn" data-type="inventory_add">Inventario</button>
        <button type="button" class="type-btn" data-type="price_promo">Precio promo</button>
      </div>

      <!-- Publicar en fecha -->
      <div class="rule-fields active" id="fields-publish">
        <label for="publishDate">Fecha y hora de publicación</label>
        <input id="publishDate" type="datetime-local" />
      </div>

      <!-- Agregar inventario en fecha -->
      <div class="rule-fields" id="fields-inventory_add">
        <label for="invQty">Cantidad a agregar</label>
        <input id="invQty" type="number" min="1" placeholder="10" />
        <label for="invLocation">Ubicación</label>
        <select id="invLocation"></select>
        <label for="invDate">Fecha y hora</label>
        <input id="invDate" type="datetime-local" />
      </div>

      <!-- Precio con tachado por rango de fechas -->
      <div class="rule-fields" id="fields-price_promo">
        <div class="field-row">
          <div>
            <label for="promoOriginal">Precio normal (1 producto)</label>
            <input id="promoOriginal" type="number" step="0.01" placeholder="899.00" />
          </div>
          <div>
            <label for="promoPrice">Precio promocional (1 producto)</label>
            <input id="promoPrice" type="number" step="0.01" placeholder="699.00" />
          </div>
        </div>
        <label for="promoPercent">— o — % de descuento (varios productos, cada uno con su precio)</label>
        <input id="promoPercent" type="number" step="0.01" placeholder="20" />
        <label for="promoStart">Inicia</label>
        <input id="promoStart" type="datetime-local" />
        <label for="promoEnd">Termina (vuelve al precio normal)</label>
        <input id="promoEnd" type="datetime-local" />
      </div>

      <button class="submit-btn" id="submitBtn">Programar</button>
      <div class="form-msg" id="formMsg"></div>
    </div>

    <!-- El tablero -->
    <div class="panel">
      <div class="board-header">
        <h2>Programación</h2>
        <div class="board-counts" id="boardCounts"></div>
      </div>
      <div id="board"></div>
    </div>

  </div>
</div>

<script>
  // -------- Config --------
  // Edita esta constante antes de desplegar en Cloudflare Pages para no
  // depender del input manual cada vez que se abre el panel.
  const DEFAULT_API_BASE = "";

  const state = {
    apiBase: DEFAULT_API_BASE,
    selectedProducts: new Map(), // id -> product
    ruleType: 'publish',
    rules: [],
    locations: []
  };

  const el = (id) => document.getElementById(id);

  function showError(msg) {
    const banner = el('errorBanner');
    banner.textContent = msg;
    banner.classList.add('visible');
  }
  function clearError() {
    el('errorBanner').classList.remove('visible');
  }

  async function api(path, options = {}) {
    if (!state.apiBase) throw new Error('Configura primero la URL del Worker (arriba a la derecha).');
    const res = await fetch(state.apiBase.replace(/\/$/, '') + path, {
      headers: { 'Content-Type': 'application/json' },
      ...options
    });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(`Error ${res.status}: ${text}`);
    }
    return res.json();
  }

  // -------- Config de API base --------

  el('apiBaseInput').value = state.apiBase;
  el('saveApiBase').addEventListener('click', () => {
    state.apiBase = el('apiBaseInput').value.trim();
    clearError();
    loadAll();
  });

  // -------- Listado / búsqueda de productos --------

  let searchTimeout;
  el('productSearch').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    const q = e.target.value.trim();
    searchTimeout = setTimeout(() => doProductSearch(q), 350);
  });

  async function doProductSearch(q) {
    try {
      clearError();
      const products = await api(`/products?query=${encodeURIComponent(q)}`);
      renderProductResults(products);
    } catch (err) {
      showError(err.message);
    }
  }

  function renderProductResults(products) {
    const box = el('productResults');
    if (!products.length) {
      box.innerHTML = '<div class="product-item">Sin resultados</div>';
      box.style.display = 'block';
      return;
    }
    box.innerHTML = products.map((p, i) => `
      <label class="product-item" data-index="${i}">
        <input type="checkbox" ${state.selectedProducts.has(p.id) ? 'checked' : ''} />
        ${p.image ? `<img src="${p.image}" />` : '<div class="ph"></div>'}
        <span>${escapeHtml(p.title)}</span>
      </label>
    `).join('');
    box.style.display = 'block';

    box.querySelectorAll('.product-item').forEach(node => {
      node.addEventListener('click', (evt) => {
        evt.preventDefault();
        const idx = Number(node.dataset.index);
        toggleProduct(products[idx]);
        node.querySelector('input').checked = state.selectedProducts.has(products[idx].id);
      });
    });
  }

  function toggleProduct(product) {
    if (state.selectedProducts.has(product.id)) {
      state.selectedProducts.delete(product.id);
    } else {
      state.selectedProducts.set(product.id, product);
    }
    renderSelectedChips();
  }

  function renderSelectedChips() {
    const box = el('selectedProduct');
    const count = state.selectedProducts.size;
    el('selectedCount').textContent = count;
    box.classList.toggle('visible', count > 0);

    el('selectedChips').innerHTML = [...state.selectedProducts.values()].map(p => `
      <span class="chip" data-id="${p.id}">${escapeHtml(p.title)}<button data-id="${p.id}">×</button></span>
    `).join('');

    el('selectedChips').querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        state.selectedProducts.delete(btn.dataset.id);
        renderSelectedChips();
      });
    });

    if (count === 1 && state.ruleType === 'price_promo') {
      const [product] = state.selectedProducts.values();
      const variant = product.variants[0];
      if (variant) el('promoOriginal').value = variant.price;
    }
  }

  el('clearProduct').addEventListener('click', () => {
    state.selectedProducts.clear();
    renderSelectedChips();
  });

  // -------- Tipo de regla --------

  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.ruleType = btn.dataset.type;

      document.querySelectorAll('.rule-fields').forEach(f => f.classList.remove('active'));
      el(`fields-${state.ruleType}`).classList.add('active');

      fillPromoDefaults();
    });
  });

  // -------- Ubicaciones (para inventario) --------

  async function loadLocations() {
    try {
      state.locations = await api('/locations');
      el('invLocation').innerHTML = state.locations.map(l =>
        `<option value="${l.id}">${escapeHtml(l.name)}</option>`
      ).join('');
    } catch (err) {
      // silencioso: puede que aún no haya API configurada
    }
  }

  // -------- Enviar el formulario --------

  el('submitBtn').addEventListener('click', submitRule);

  async function submitRule() {
    const msg = el('formMsg');
    msg.className = 'form-msg';

    const products = [...state.selectedProducts.values()];
    if (!products.length) {
      msg.textContent = 'Selecciona al menos un producto.';
      msg.classList.add('err');
      return;
    }

    try {
      el('submitBtn').disabled = true;

      if (state.ruleType === 'publish') {
        const runAt = el('publishDate').value;
        if (!runAt) throw new Error('Falta la fecha de publicación.');
        for (const product of products) {
          await api('/rules', { method: 'POST', body: JSON.stringify({
            type: 'publish',
            product_id: product.id,
            product_title: product.title,
            run_at: new Date(runAt).toISOString()
          })});
        }
      }

      if (state.ruleType === 'inventory_add') {
        const qty = el('invQty').value;
        const runAt = el('invDate').value;
        const locationId = el('invLocation').value;
        if (!qty || !runAt || !locationId) throw new Error('Completa cantidad, ubicación y fecha.');
        for (const product of products) {
          const variant = product.variants[0];
          if (!variant) continue;
          await api('/rules', { method: 'POST', body: JSON.stringify({
            type: 'inventory_add',
            product_title: product.title,
            inventory_item_id: variant.inventoryItemId,
            location_id: locationId,
            quantity: Number(qty),
            run_at: new Date(runAt).toISOString()
          })});
        }
      }

      if (state.ruleType === 'price_promo') {
        const fixedOriginal = el('promoOriginal').value;
        const fixedPromo = el('promoPrice').value;
        const percent = el('promoPercent').value;
        const start = el('promoStart').value;
        const end = el('promoEnd').value;
        if (!start || !end) throw new Error('Completa ambas fechas.');
        if (new Date(end) <= new Date(start)) throw new Error('La fecha de fin debe ser después del inicio.');
        if (!percent && (!fixedOriginal || !fixedPromo)) {
          throw new Error('Completa precio normal + promocional, o un % de descuento.');
        }

        for (const product of products) {
          const variant = product.variants[0];
          if (!variant) continue;

          const original = percent ? variant.price : fixedOriginal;
          const promo = percent
            ? (Number(variant.price) * (1 - Number(percent) / 100)).toFixed(2)
            : fixedPromo;
          const groupId = crypto.randomUUID();

          await api('/rules', { method: 'POST', body: JSON.stringify({
            type: 'price_promo_start',
            group_id: groupId,
            product_id: product.id,
            product_title: product.title,
            variant_id: variant.id,
            variant_title: variant.title,
            original_price: original,
            promo_price: promo,
            run_at: new Date(start).toISOString()
          })});

          await api('/rules', { method: 'POST', body: JSON.stringify({
            type: 'price_promo_end',
            group_id: groupId,
            product_id: product.id,
            product_title: product.title,
            variant_id: variant.id,
            variant_title: variant.title,
            original_price: original,
            run_at: new Date(end).toISOString()
          })});
        }
      }

      msg.textContent = `Regla programada para ${products.length} producto(s).`;
      msg.classList.add('ok');
      await loadRules();

    } catch (err) {
      msg.textContent = err.message;
      msg.classList.add('err');
    } finally {
      el('submitBtn').disabled = false;
    }
  }

  // -------- El tablero --------

  async function loadRules() {
    try {
      clearError();
      state.rules = await api('/rules');
      renderBoard();
    } catch (err) {
      showError(err.message);
    }
  }

  function renderBoard() {
    const groups = { pending: [], done: [], failed: [] };
    state.rules.forEach(r => (groups[r.status] || groups.pending).push(r));

    el('boardCounts').innerHTML = `
      <span class="amber">${groups.pending.length} pendiente</span>
      <span class="teal">${groups.done.length} hecho</span>
      <span class="red">${groups.failed.length} fallido</span>
    `;

    const board = el('board');
    const order = [['pending', 'Pendiente'], ['failed', 'Falló'], ['done', 'Hecho']];
    const sections = order
      .filter(([key]) => groups[key].length)
      .map(([key, label]) => `
        <div class="board-group">
          <div class="board-group-title">${label}</div>
          ${groups[key].map(rowHtml).join('')}
        </div>
      `).join('');

    board.innerHTML = sections || '<div class="empty-state">Nada programado todavía.</div>';

    board.querySelectorAll('.row-delete').forEach(btn => {
      btn.addEventListener('click', () => deleteRule(btn.dataset.id));
    });
  }

  function rowHtml(rule) {
    const time = formatDate(rule.run_at);
    const { label, sub } = describeRule(rule);
    return `
      <div class="board-row ${rule.status}">
        <div class="time">${time}</div>
        <div class="desc">${label}${sub ? `<div class="sub">${sub}</div>` : ''}</div>
        <div class="action-type">${typeLabel(rule.type)}</div>
        <div class="status-pill ${rule.status}">${statusLabel(rule.status)}</div>
        <button class="row-delete" data-id="${rule.id}" title="Eliminar">×</button>
      </div>
    `;
  }

  function describeRule(rule) {
    switch (rule.type) {
      case 'publish':
        return { label: escapeHtml(rule.product_title || rule.product_id), sub: 'Publicar producto' };
      case 'inventory_add':
        return { label: escapeHtml(rule.product_title || ''), sub: `+${rule.quantity} piezas` };
      case 'price_promo_start':
        return { label: escapeHtml(rule.product_title || ''), sub: `${rule.original_price} → ${rule.promo_price}` };
      case 'price_promo_end':
        return { label: escapeHtml(rule.product_title || ''), sub: `Vuelve a ${rule.original_price}` };
      default:
        return { label: rule.type, sub: '' };
    }
  }

  function typeLabel(type) {
    return {
      publish: 'Publicar',
      inventory_add: 'Inventario',
      price_promo_start: 'Promo inicia',
      price_promo_end: 'Promo termina'
    }[type] || type;
  }

  function statusLabel(status) {
    return { pending: 'Pendiente', done: 'Hecho', failed: 'Falló' }[status] || status;
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleString('es-MX', {
      day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
    });
  }

  async function deleteRule(id) {
    try {
      await api(`/rules/${id}`, { method: 'DELETE' });
      await loadRules();
    } catch (err) {
      showError(err.message);
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }

  // -------- Arranque --------

  async function loadAll() {
    if (!state.apiBase) return;
    await Promise.all([loadRules(), loadLocations(), doProductSearch('')]);
  }

  loadAll();
  setInterval(loadRules, 60000); // refresca el tablero cada minuto
</script>

</body>
</html>
